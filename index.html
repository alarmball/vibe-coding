<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RunMate - 러닝메이트 모집</title>
  <style>
    :root{--orange:#ff792e;--orange2:#ff9b45;--ink:#18202c;--muted:#788291;--line:#e7eaf0;--bg:#f4f7fb;--card:#fff;--green:#22a06b;--red:#df4f5c;--shadow:0 16px 46px rgba(35,48,75,.10)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(145deg,#f7f9fc,#eef3f9);color:var(--ink);font-family:Pretendard,"Noto Sans KR",Arial,sans-serif}button,input,textarea,select{font:inherit}button{cursor:pointer}.wrap{width:min(1120px,100%);margin:auto;padding:0 20px}.topbar{position:sticky;top:0;z-index:20;border-bottom:1px solid rgba(231,234,240,.8);background:rgba(255,255,255,.9);backdrop-filter:blur(16px)}.top-inner{display:flex;align-items:center;justify-content:space-between;min-height:72px;gap:20px}.brand{display:flex;align-items:center;gap:11px;font-size:21px;font-weight:950}.logo{display:grid;place-items:center;width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--orange2),var(--orange));color:#fff}.auth{display:flex;align-items:center;gap:10px}.profile{display:none;align-items:center;gap:9px}.profile.show{display:flex}.profile img{width:35px;height:35px;border-radius:50%;object-fit:cover;background:#eee}.profile span{max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;font-weight:800}.btn{min-height:42px;padding:0 16px;border:0;border-radius:11px;background:linear-gradient(135deg,var(--orange2),var(--orange));color:#fff;font-weight:850}.btn:hover{filter:brightness(.96)}.btn:disabled{cursor:not-allowed;opacity:.48}.btn.ghost{border:1px solid var(--line);background:#fff;color:var(--ink)}.btn.green{background:var(--green)}.hero{padding:52px 0 29px}.hero-row{display:flex;align-items:end;justify-content:space-between;gap:20px}.eyebrow{color:var(--orange);font-size:12px;font-weight:900;letter-spacing:.13em}.hero h1{margin:9px 0 8px;font-size:clamp(30px,5vw,45px);letter-spacing:-.045em}.hero p{margin:0;color:var(--muted);line-height:1.7}.login-note{margin:0 0 20px;padding:13px 16px;border:1px solid #ffddb9;border-radius:12px;background:#fff7ed;color:#b65b12;font-size:13px}.login-note.hide{display:none}.section-head{display:flex;align-items:center;justify-content:space-between;margin:7px 0 15px}.section-head h2{margin:0;font-size:20px}.count{color:var(--muted);font-size:12px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:17px;padding-bottom:70px}.post{padding:21px;border:1px solid var(--line);border-radius:18px;background:var(--card);box-shadow:var(--shadow);transition:.18s}.post:hover{transform:translateY(-3px);border-color:#ffd0ae}.post-top{display:flex;justify-content:space-between;gap:12px;margin-bottom:16px}.post h3{margin:0 0 7px;font-size:18px}.host{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:11px}.host img{width:24px;height:24px;border-radius:50%;object-fit:cover;background:#eee}.status{height:27px;padding:0 9px;border-radius:99px;background:#e9f8f1;color:var(--green);font-size:10px;font-weight:900}.status.full{background:#f2f3f6;color:#8a909d}.facts{display:grid;grid-template-columns:1fr 1fr;gap:9px}.fact{padding:10px;border-radius:10px;background:#f7f8fb}.fact small{display:block;margin-bottom:4px;color:#9aa1ad;font-size:9px;font-weight:900}.fact strong{font-size:12px}.empty{grid-column:1/-1;padding:65px 20px;border:1px dashed #ccd2dc;border-radius:18px;color:var(--muted);text-align:center}.modal{display:none;position:fixed;inset:0;z-index:40;padding:20px;background:rgba(17,24,39,.5);overflow:auto}.modal.open{display:grid;place-items:center}.dialog{width:min(620px,100%);max-height:calc(100vh - 40px);overflow:auto;border-radius:21px;background:#fff;box-shadow:0 25px 80px rgba(0,0,0,.23)}.dialog-head{position:sticky;top:0;z-index:2;display:flex;justify-content:space-between;align-items:center;padding:19px 22px;border-bottom:1px solid var(--line);background:#fff}.dialog-head h2{margin:0;font-size:19px}.close{width:36px;height:36px;border:0;border-radius:50%;background:#f2f3f6;font-size:20px}.dialog-body{padding:22px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}.field{margin-bottom:14px}.field.full{grid-column:1/-1}.field label{display:block;margin-bottom:7px;font-size:12px;font-weight:850}.input{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:11px;outline:none}.input:focus{border-color:var(--orange2);box-shadow:0 0 0 3px rgba(255,121,46,.1)}textarea.input{min-height:100px;resize:vertical;line-height:1.55}.detail-title{margin:0 0 8px;font-size:25px}.detail-text{margin:17px 0;padding:16px;border-radius:13px;background:#f7f8fb;color:#505968;line-height:1.75;white-space:pre-wrap}.detail-facts{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.detail-fact{padding:13px 8px;border:1px solid var(--line);border-radius:11px;text-align:center}.detail-fact small{display:block;margin-bottom:5px;color:var(--muted);font-size:9px}.detail-fact strong{font-size:13px}.apply-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:18px 0}.members{color:var(--muted);font-size:12px}.chat{padding:16px;border:1px solid var(--line);border-radius:15px;background:#fafbfc}.chat h3{margin:0 0 12px;font-size:14px}.messages{display:grid;gap:8px;max-height:240px;overflow:auto;margin-bottom:11px}.message{display:flex;gap:8px}.message img{width:27px;height:27px;border-radius:50%;object-fit:cover}.bubble{padding:8px 10px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:12px;line-height:1.5}.bubble b{display:block;margin-bottom:2px;font-size:10px}.chat-form{display:flex;gap:8px}.chat-form .input{min-width:0}.toast{position:fixed;right:22px;bottom:22px;z-index:60;max-width:360px;padding:14px 17px;border-radius:11px;background:#247c58;color:#fff;box-shadow:var(--shadow);opacity:0;transform:translateY(12px);pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:none}.toast.error{background:var(--red)}
    @media(max-width:700px){.grid{grid-template-columns:1fr}.hero-row{align-items:flex-start;flex-direction:column}.profile span{display:none}.wrap{padding:0 14px}.form-grid,.detail-facts{grid-template-columns:1fr}.field.full{grid-column:auto}.dialog-body{padding:18px}.modal{padding:8px}.dialog{max-height:calc(100vh - 16px)}}
  </style>
</head>
<body>
  <header class="topbar"><div class="wrap top-inner"><div class="brand"><span class="logo">🏃</span><span>RunMate</span></div><div class="auth"><div id="profile" class="profile"><img id="profilePhoto" alt="프로필"><span id="profileName"></span></div><button id="authButton" class="btn ghost">Google 로그인</button></div></div></header>
  <main class="wrap"><section class="hero"><div class="hero-row"><div><div class="eyebrow">FIND YOUR PACEMATE</div><h1>함께 달릴 러닝메이트를 찾아요</h1><p>지역과 페이스가 맞는 러너를 만나 함께 달려보세요.</p></div><button id="openCreate" class="btn" disabled>+ 모집글 작성</button></div></section><div id="loginNote" class="login-note">로그인 전에는 모집글 목록만 볼 수 있습니다. 상세 조회·작성·신청·채팅은 로그인 후 이용해주세요.</div><div class="section-head"><h2>🔥 러닝메이트 모집</h2><span id="postCount" class="count">0개의 모집</span></div><section id="postList" class="grid"><div class="empty">모집글을 불러오는 중입니다.</div></section></main>

  <div id="createModal" class="modal"><section class="dialog"><header class="dialog-head"><h2>러닝메이트 모집하기</h2><button class="close" data-close="createModal">×</button></header><div class="dialog-body"><form id="createForm" class="form-grid"><div class="field full"><label for="title">모집 제목</label><input id="title" class="input" maxlength="60" placeholder="예: 여의도 한강 야간 러닝" required></div><div class="field"><label for="runDate">날짜</label><input id="runDate" class="input" type="date" required></div><div class="field"><label for="runTime">시간</label><input id="runTime" class="input" type="time" required></div><div class="field full"><label for="location">장소</label><input id="location" class="input" maxlength="80" placeholder="예: 여의나루역 2번 출구" required></div><div class="field"><label for="pace">페이스</label><input id="pace" class="input" maxlength="20" placeholder="예: 6'00\"/km" required></div><div class="field"><label for="capacity">모집인원</label><input id="capacity" class="input" type="number" min="2" max="100" value="4" required></div><div class="field full"><label for="content">상세 내용</label><textarea id="content" class="input" maxlength="1000" placeholder="코스, 거리, 준비물 등을 알려주세요." required></textarea></div><div class="field full"><button id="createSubmit" class="btn" style="width:100%">모집글 등록</button></div></form></div></section></div>

  <div id="detailModal" class="modal"><section class="dialog"><header class="dialog-head"><h2>모집 상세</h2><button class="close" data-close="detailModal">×</button></header><div id="detailBody" class="dialog-body"></div></section></div><div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module">
    import{initializeApp}from"https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";import{getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";import{getDatabase,ref,push,set,get,onValue,query,orderByChild,runTransaction,serverTimestamp}from"https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";
    const firebaseConfig={apiKey:"AIzaSyBH9wy8EMJnc8VK2qKJAQhQcO5HCKOEawI",authDomain:"vibe-coding-88fba.firebaseapp.com",databaseURL:"https://vibe-coding-88fba-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"vibe-coding-88fba",storageBucket:"vibe-coding-88fba.firebasestorage.app",messagingSenderId:"712429656291",appId:"1:712429656291:web:3ee6e576f554628dd94dd6"};
    const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getDatabase(app),provider=new GoogleAuthProvider(),$=id=>document.getElementById(id),ui={profile:$("profile"),photo:$("profilePhoto"),name:$("profileName"),auth:$("authButton"),openCreate:$("openCreate"),loginNote:$("loginNote"),list:$("postList"),count:$("postCount"),createModal:$("createModal"),detailModal:$("detailModal"),createForm:$("createForm"),createSubmit:$("createSubmit"),detail:$("detailBody"),toast:$("toast")};let user=null,posts={},activeId=null,stopDetail=null,stopParticipants=null,stopChat=null,toastTimer;
    const text=(tag,cls,value)=>{const n=document.createElement(tag);if(cls)n.className=cls;if(value!==undefined)n.textContent=value;return n},photo=u=>u||"https://ui-avatars.com/api/?background=ff8a38&color=fff&name=R",showToast=(msg,type="success")=>{clearTimeout(toastTimer);ui.toast.textContent=msg;ui.toast.className=`toast ${type} show`;toastTimer=setTimeout(()=>ui.toast.classList.remove("show"),2800)},open=id=>$(id).classList.add("open"),close=id=>$(id).classList.remove("open");
    document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>b.dataset.close==="detailModal"?closeDetail():close(b.dataset.close));document.querySelectorAll(".modal").forEach(m=>m.onclick=e=>{if(e.target===m)(m.id==="detailModal"?closeDetail():close(m.id))});
    ui.auth.onclick=async()=>{ui.auth.disabled=true;try{user?await signOut(auth):await signInWithPopup(auth,provider)}catch(e){console.error(e);showToast(`로그인 실패 (${e.code||"error"})`,"error")}finally{ui.auth.disabled=false}};
    onAuthStateChanged(auth,current=>{user=current;ui.profile.classList.toggle("show",!!current);ui.loginNote.classList.toggle("hide",!!current);ui.openCreate.disabled=!current;ui.auth.textContent=current?"로그아웃":"Google 로그인";if(current){ui.name.textContent=current.displayName||current.email;ui.photo.src=photo(current.photoURL)}else{ui.name.textContent="";ui.photo.removeAttribute("src");if(ui.detailModal.classList.contains("open"))closeDetail()}renderPosts()});
    ui.openCreate.onclick=()=>{if(!user)return;$("runDate").min=new Date().toISOString().slice(0,10);open("createModal")};
    ui.createForm.onsubmit=async e=>{e.preventDefault();if(!user)return;const data={title:$("title").value.trim(),date:$("runDate").value,time:$("runTime").value,location:$("location").value.trim(),pace:$("pace").value.trim(),capacity:Number($("capacity").value),hostId:user.uid,hostName:user.displayName||user.email,hostPhoto:user.photoURL||"",createdAt:serverTimestamp()};const content=$("content").value.trim();if(!data.title||!data.date||!data.time||!data.location||!data.pace||!content)return;ui.createSubmit.disabled=true;try{const postRef=push(ref(db,"posts"));await set(postRef,data);await set(ref(db,`postDetails/${postRef.key}`),{content});await set(ref(db,`participants/${postRef.key}/${user.uid}`),{name:data.hostName,photo:data.hostPhoto,joinedAt:serverTimestamp()});ui.createForm.reset();close("createModal");showToast("모집글을 등록했습니다.")}catch(err){console.error(err);showToast("모집글 등록에 실패했습니다.","error")}finally{ui.createSubmit.disabled=false}};
    onValue(query(ref(db,"posts"),orderByChild("createdAt")),snap=>{posts=snap.val()||{};renderPosts()},err=>{console.error(err);ui.list.replaceChildren(text("div","empty","모집글을 불러오지 못했습니다."))});
    function renderPosts(){const entries=Object.entries(posts).sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0));ui.count.textContent=`${entries.length}개의 모집`;ui.list.replaceChildren();if(!entries.length){ui.list.append(text("div","empty","아직 등록된 모집글이 없습니다."));return}entries.forEach(([id,p])=>{const card=text("article","post"),top=text("div","post-top"),left=text("div"),title=text("h3","",p.title),host=text("div","host"),img=document.createElement("img"),status=text("span","status","모집중"),facts=text("div","facts");img.src=photo(p.hostPhoto);host.append(img,text("span","",p.hostName||"러너"));left.append(title,host);top.append(left,status);[["날짜·시간",`${p.date} ${p.time}`],["장소",p.location],["페이스",p.pace],["모집인원",`${p.capacity}명`]].forEach(([a,b])=>{const f=text("div","fact");f.append(text("small","",a),text("strong","",b));facts.append(f)});card.append(top,facts);card.onclick=()=>user?openDetail(id):showToast("상세페이지는 로그인 후 볼 수 있습니다.","error");ui.list.append(card)})}
    function cleanupDetail(){[stopDetail,stopParticipants,stopChat].forEach(fn=>fn&&fn());stopDetail=stopParticipants=stopChat=null}function closeDetail(){cleanupDetail();activeId=null;close("detailModal")}
    async function openDetail(id){if(!user)return;cleanupDetail();activeId=id;const p=posts[id];if(!p)return;ui.detail.replaceChildren();const title=text("h2","detail-title",p.title),host=text("div","host"),img=document.createElement("img");img.src=photo(p.hostPhoto);host.append(img,text("span","",`${p.hostName||"러너"} 님의 모집`));const facts=text("div","detail-facts");[["날짜·시간",`${p.date} ${p.time}`],["장소",p.location],["페이스",p.pace]].forEach(([a,b])=>{const f=text("div","detail-fact");f.append(text("small","",a),text("strong","",b));facts.append(f)});const body=text("p","detail-text","불러오는 중..."),applyRow=text("div","apply-row"),members=text("span","members","참가자 확인 중..."),apply=text("button","btn green","참가 신청"),chat=text("section","chat"),chatTitle=text("h3","","💬 러닝메이트 채팅방"),messages=text("div","messages"),form=text("form","chat-form"),input=document.createElement("input"),send=text("button","btn","전송");input.className="input";input.maxLength=300;input.placeholder="메시지를 입력하세요";form.append(input,send);chat.append(chatTitle,messages,form);applyRow.append(members,apply);ui.detail.append(title,host,facts,body,applyRow,chat);open("detailModal");stopDetail=onValue(ref(db,`postDetails/${id}`),s=>body.textContent=s.val()?.content||"상세 내용이 없습니다.");stopParticipants=onValue(ref(db,`participants/${id}`),s=>{const people=s.val()||{},joined=!!people[user.uid],count=Object.keys(people).length;members.textContent=`참가 ${count} / ${p.capacity}명`;apply.textContent=joined?"신청 취소":"참가 신청";apply.disabled=!joined&&count>=p.capacity});apply.onclick=async()=>{const target=ref(db,`participants/${id}/${user.uid}`);try{await runTransaction(target,current=>current?null:{name:user.displayName||user.email,photo:user.photoURL||"",joinedAt:Date.now()})}catch(e){console.error(e);showToast("참가 신청을 처리하지 못했습니다.","error")}};stopChat=onValue(query(ref(db,`chats/${id}`),orderByChild("createdAt")),s=>{messages.replaceChildren();Object.values(s.val()||{}).sort((a,b)=>a.createdAt-b.createdAt).forEach(m=>{const row=text("div","message"),avatar=document.createElement("img"),bubble=text("div","bubble");avatar.src=photo(m.photo);bubble.append(text("b","",m.name||"러너"),text("span","",m.text));row.append(avatar,bubble);messages.append(row)});messages.scrollTop=messages.scrollHeight});form.onsubmit=async e=>{e.preventDefault();const value=input.value.trim();if(!value)return;send.disabled=true;try{await push(ref(db,`chats/${id}`),{uid:user.uid,name:user.displayName||user.email,photo:user.photoURL||"",text:value,createdAt:serverTimestamp()});input.value=""}catch(err){console.error(err);showToast("메시지 전송에 실패했습니다.","error")}finally{send.disabled=false}}}
  </script>
</body>
</html>
