<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카페 매출 관리</title>
  <style>
    :root{--primary:#5b3d2e;--primary2:#7a5744;--accent:#d89a62;--bg:#f5f2ed;--card:#fff;--text:#2d2926;--muted:#77716c;--line:#e7e0da;--danger:#c64b45;--success:#287a52;--shadow:0 14px 40px rgba(67,49,39,.09)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:Pretendard,"Noto Sans KR",Arial,sans-serif}button,input,select{font:inherit}button{cursor:pointer}
    .header{padding:27px 24px;background:linear-gradient(135deg,var(--primary),#38261e);color:#fff}.header-inner,.container{width:min(1180px,100%);margin:auto}.header h1{margin:0;font-size:26px}.header p{margin:7px 0 0;color:#e9dcd4;font-size:13px}
    .container{padding:24px}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}.summary-card{padding:20px;border:1px solid var(--line);border-radius:17px;background:var(--card);box-shadow:var(--shadow)}.summary-card span{display:block;color:var(--muted);font-size:12px}.summary-card strong{display:block;margin-top:10px;color:var(--primary);font-size:25px}
    .tabs{display:flex;gap:7px;margin-bottom:16px;padding:6px;border-radius:14px;background:#e9e3dd}.tab{flex:1;padding:12px;border:0;border-radius:10px;background:transparent;color:var(--muted);font-weight:800}.tab.active{background:#fff;color:var(--primary);box-shadow:0 3px 12px rgba(60,40,30,.08)}
    .tab-panel{display:none}.tab-panel.active{display:block}.layout{display:grid;grid-template-columns:360px minmax(0,1fr);gap:20px}.card{overflow:hidden;border:1px solid var(--line);border-radius:18px;background:var(--card);box-shadow:var(--shadow)}.card-head{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:19px 21px;border-bottom:1px solid var(--line)}.card-head h2{margin:0;font-size:18px}.card-head p{margin:5px 0 0;color:var(--muted);font-size:12px}.card-body{padding:21px}
    .field{margin-bottom:16px}.field label{display:block;margin-bottom:7px;font-size:13px;font-weight:800}.control{width:100%;height:45px;padding:0 13px;border:1px solid var(--line);border-radius:10px;background:#fff;outline:none}.control:focus{border-color:var(--primary2);box-shadow:0 0 0 3px rgba(91,61,46,.11)}.control[readonly]{background:#f7f5f2;color:var(--muted)}
    .button{min-height:44px;padding:0 16px;border:0;border-radius:10px;background:var(--primary);color:#fff;font-weight:800}.button:hover{background:#422c21}.button:disabled{opacity:.5;cursor:not-allowed}.button.full{width:100%}.button.danger{min-height:32px;padding:0 11px;background:#fff0ef;color:var(--danger);font-size:11px}.button.danger:hover{background:#ffe2df}
    .menu-list{display:grid;gap:10px}.menu-item{display:flex;justify-content:space-between;align-items:center;gap:15px;padding:15px;border:1px solid var(--line);border-radius:12px}.menu-name{font-weight:800}.menu-meta{margin-top:5px;color:var(--muted);font-size:12px}.badge{display:inline-block;margin-right:6px;padding:3px 7px;border-radius:99px;background:#f2e6dc;color:var(--primary);font-size:10px;font-weight:800}
    .filter{height:38px;min-width:150px;padding:0 10px;border:1px solid var(--line);border-radius:9px;background:#fff}.table-wrap{overflow:auto;padding:0 21px 21px}table{width:100%;min-width:760px;border-collapse:collapse}th,td{padding:14px 10px;border-bottom:1px solid var(--line);text-align:left;font-size:12px}th{color:var(--muted);font-size:11px}.amount{color:var(--primary);font-weight:800}.empty{padding:42px!important;text-align:center!important;color:var(--muted)}
    .total-preview{display:flex;justify-content:space-between;margin:2px 0 16px;padding:15px;border-radius:12px;background:#f3ece6;color:var(--primary);font-size:14px}.toast{position:fixed;right:22px;bottom:22px;max-width:360px;padding:14px 18px;border-radius:10px;background:var(--success);color:#fff;box-shadow:var(--shadow);opacity:0;transform:translateY(14px);pointer-events:none;transition:.22s}.toast.show{opacity:1;transform:none}.toast.error{background:var(--danger)}
    .setup{display:none;margin-bottom:18px;padding:14px 17px;border:1px solid #e8c383;border-radius:12px;background:#fff7e6;color:#735322;font-size:13px}.setup.show{display:block}
    @media(max-width:820px){.layout{grid-template-columns:1fr}.summary{grid-template-columns:1fr}.container{padding:16px}.header{padding:23px 16px}.card-head{align-items:flex-start;flex-direction:column}.filter{width:100%}}
  </style>
</head>
<body>
  <header class="header"><div class="header-inner"><h1>☕ 카페 매출 관리</h1><p>Firestore 실시간 메뉴 및 매출 관리 시스템</p></div></header>
  <main class="container">
    <div id="setupMessage" class="setup">상단 스크립트의 <strong>firebaseConfig</strong>에 Firebase 프로젝트 설정값을 입력해주세요.</div>
    <section class="summary"><article class="summary-card"><span>표시 중인 주문</span><strong id="totalCount">0건</strong></article><article class="summary-card"><span>판매 수량</span><strong id="totalQuantity">0개</strong></article><article class="summary-card"><span>총 매출</span><strong id="totalSales">0원</strong></article></section>
    <nav class="tabs" aria-label="관리 메뉴"><button class="tab active" data-tab="salesPanel">매출 입력 및 목록</button><button class="tab" data-tab="menuPanel">메뉴 관리</button></nav>

    <section id="salesPanel" class="tab-panel active"><div class="layout">
      <article class="card"><div class="card-head"><div><h2>매출 입력</h2><p>메뉴 선택 후 수량을 입력하세요.</p></div></div><div class="card-body"><form id="salesForm">
        <div class="field"><label for="saleDate">날짜</label><input id="saleDate" class="control" type="date" required></div>
        <div class="field"><label for="saleMenu">메뉴</label><select id="saleMenu" class="control" required disabled><option value="">메뉴를 불러오는 중...</option></select></div>
        <div class="field"><label for="salePrice">가격</label><input id="salePrice" class="control" type="text" value="0원" readonly></div>
        <div class="field"><label for="saleQuantity">수량</label><input id="saleQuantity" class="control" type="number" min="1" max="999" value="1" required></div>
        <div class="total-preview"><span>합계</span><strong id="saleTotal">0원</strong></div><button id="salesSaveButton" class="button full" disabled>매출 저장</button>
      </form></div></article>
      <article class="card"><div class="card-head"><div><h2>매출 목록</h2><p>Firestore 변경사항이 실시간 반영됩니다.</p></div><select id="categoryFilter" class="filter" aria-label="카테고리 필터"><option value="all">전체 카테고리</option></select></div><div class="table-wrap"><table><thead><tr><th>날짜</th><th>카테고리</th><th>메뉴명</th><th>수량</th><th>가격</th><th>합계</th><th>관리</th></tr></thead><tbody id="salesBody"><tr><td colspan="7" class="empty">매출을 불러오는 중입니다.</td></tr></tbody></table></div></article>
    </div></section>

    <section id="menuPanel" class="tab-panel"><div class="layout">
      <article class="card"><div class="card-head"><div><h2>메뉴 등록</h2><p>카테고리는 매출 필터에 사용됩니다.</p></div></div><div class="card-body"><form id="menuForm"><div class="field"><label for="menuCategory">카테고리</label><input id="menuCategory" class="control" maxlength="30" placeholder="예: 커피" required></div><div class="field"><label for="menuName">메뉴명</label><input id="menuName" class="control" maxlength="50" placeholder="예: 아메리카노" required></div><div class="field"><label for="menuPrice">가격</label><input id="menuPrice" class="control" type="number" min="0" step="100" placeholder="4500" required></div><button id="menuSaveButton" class="button full">메뉴 등록</button></form></div></article>
      <article class="card"><div class="card-head"><div><h2>등록 메뉴</h2><p>삭제해도 기존 매출 내역은 유지됩니다.</p></div></div><div class="card-body"><div id="menuList" class="menu-list"><div class="empty">메뉴를 불러오는 중입니다.</div></div></div></article>
    </div></section>
  </main><div id="toast" class="toast" role="status"></div>

  <script type="module">
    // Firebase Console → 프로젝트 설정 → 내 앱에서 아래 값을 복사해 입력하세요.
    const firebaseConfig = {
      apiKey: "여기에_입력",
      authDomain: "여기에_입력",
      projectId: "여기에_입력",
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const byId = (id) => document.getElementById(id);
    const currency = (value) => `${Number(value || 0).toLocaleString("ko-KR")}원`;
    const localDate = () => { const date = new Date(); return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`; };
    const elements = { setup:byId("setupMessage"), menuForm:byId("menuForm"), menuCategory:byId("menuCategory"), menuName:byId("menuName"), menuPrice:byId("menuPrice"), menuSaveButton:byId("menuSaveButton"), menuList:byId("menuList"), salesForm:byId("salesForm"), saleDate:byId("saleDate"), saleMenu:byId("saleMenu"), salePrice:byId("salePrice"), saleQuantity:byId("saleQuantity"), saleTotal:byId("saleTotal"), salesSaveButton:byId("salesSaveButton"), salesBody:byId("salesBody"), categoryFilter:byId("categoryFilter"), toast:byId("toast") };
    let menus = [], sales = [], toastTimer;
    elements.saleDate.value = localDate();

    document.querySelectorAll(".tab").forEach((button) => button.addEventListener("click", () => { document.querySelectorAll(".tab,.tab-panel").forEach((item) => item.classList.remove("active")); button.classList.add("active"); byId(button.dataset.tab).classList.add("active"); }));
    function showToast(message, type="success") { clearTimeout(toastTimer); elements.toast.textContent=message; elements.toast.className=`toast ${type} show`; toastTimer=setTimeout(()=>elements.toast.classList.remove("show"),2500); }
    function selectedMenu() { return menus.find((menu) => menu.id === elements.saleMenu.value); }
    function updateSaleTotal() { const menu=selectedMenu(); const quantity=Math.max(1,Number(elements.saleQuantity.value)||1); elements.salePrice.value=currency(menu?.price); elements.saleTotal.textContent=currency(Number(menu?.price||0)*quantity); }
    function setBusy(button,busy,label) { button.disabled=busy; button.textContent=busy?"처리 중...":label; }

    const isConfigured = !Object.values(firebaseConfig).some((value) => value.includes("여기에_입력"));
    if (!isConfigured) { elements.setup.classList.add("show"); elements.menuList.innerHTML='<div class="empty">Firebase 설정값 입력이 필요합니다.</div>'; elements.salesBody.innerHTML='<tr><td colspan="7" class="empty">Firebase 설정값 입력이 필요합니다.</td></tr>'; }
    else {
      const db = getFirestore(initializeApp(firebaseConfig));
      function renderMenus() {
        elements.saleMenu.innerHTML = menus.length ? '<option value="">메뉴를 선택하세요</option>' : '<option value="">등록된 메뉴가 없습니다</option>';
        menus.forEach((menu) => { const option=document.createElement("option"); option.value=menu.id; option.textContent=`[${menu.category||"기타"}] ${menu.name} - ${currency(menu.price)}`; elements.saleMenu.append(option); });
        elements.saleMenu.disabled=!menus.length; elements.salesSaveButton.disabled=!menus.length; elements.menuList.replaceChildren();
        if (!menus.length) { elements.menuList.innerHTML='<div class="empty">등록된 메뉴가 없습니다.</div>'; return; }
        menus.forEach((menu) => { const item=document.createElement("article"); item.className="menu-item"; const info=document.createElement("div"); const badge=document.createElement("span"); badge.className="badge"; badge.textContent=menu.category||"기타"; const name=document.createElement("span"); name.className="menu-name"; name.textContent=menu.name; const meta=document.createElement("div"); meta.className="menu-meta"; meta.textContent=currency(menu.price); info.append(badge,name,meta); const button=document.createElement("button"); button.className="button danger"; button.textContent="삭제"; button.addEventListener("click",()=>removeDoc("menus",menu.id,`“${menu.name}” 메뉴를 삭제할까요?`,button)); item.append(info,button); elements.menuList.append(item); });
      }
      function renderCategoryFilter() { const current=elements.categoryFilter.value; const categories=[...new Set([...menus.map(m=>m.category||"기타"),...sales.map(s=>s.category||"기타")])].sort((a,b)=>a.localeCompare(b,"ko")); elements.categoryFilter.innerHTML='<option value="all">전체 카테고리</option>'; categories.forEach((category)=>{const option=document.createElement("option");option.value=category;option.textContent=category;elements.categoryFilter.append(option)}); if(categories.includes(current))elements.categoryFilter.value=current; }
      function renderSales() { const category=elements.categoryFilter.value; const filtered=category==="all"?sales:sales.filter((sale)=>(sale.category||"기타")===category); byId("totalCount").textContent=`${filtered.length.toLocaleString()}건`; byId("totalQuantity").textContent=`${filtered.reduce((sum,sale)=>sum+Number(sale.quantity||0),0).toLocaleString()}개`; byId("totalSales").textContent=currency(filtered.reduce((sum,sale)=>sum+Number(sale.total||0),0)); elements.salesBody.replaceChildren(); if(!filtered.length){elements.salesBody.innerHTML='<tr><td colspan="7" class="empty">표시할 매출이 없습니다.</td></tr>';return} filtered.forEach((sale)=>{const row=document.createElement("tr"); [sale.date,sale.category||"기타",sale.menuName,`${Number(sale.quantity).toLocaleString()}개`,currency(sale.price),currency(sale.total)].forEach((value,index)=>{const cell=document.createElement("td");cell.textContent=value??"-";if(index===5)cell.className="amount";row.append(cell)});const action=document.createElement("td");const button=document.createElement("button");button.className="button danger";button.textContent="삭제";button.addEventListener("click",()=>removeDoc("sales",sale.id,`“${sale.menuName}” 매출을 삭제할까요?`,button));action.append(button);row.append(action);elements.salesBody.append(row)}); }
      async function removeDoc(collectionName,id,message,button) { if(!confirm(message))return; button.disabled=true; try{await deleteDoc(doc(db,collectionName,id));showToast("삭제되었습니다.")}catch(error){console.error(error);showToast("삭제에 실패했습니다.","error");button.disabled=false} }

      onSnapshot(query(collection(db,"menus"),orderBy("name","asc")),(snapshot)=>{menus=snapshot.docs.map((item)=>({id:item.id,...item.data()}));renderMenus();renderCategoryFilter()},(error)=>{console.error(error);showToast("메뉴 조회에 실패했습니다.","error")});
      onSnapshot(query(collection(db,"sales"),orderBy("date","desc")),(snapshot)=>{sales=snapshot.docs.map((item)=>({id:item.id,...item.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));renderCategoryFilter();renderSales()},(error)=>{console.error(error);showToast("매출 조회에 실패했습니다.","error")});
      elements.menuForm.addEventListener("submit",async(event)=>{event.preventDefault();const category=elements.menuCategory.value.trim(),name=elements.menuName.value.trim(),price=Number(elements.menuPrice.value);if(!category||!name||!Number.isFinite(price)||price<0)return showToast("메뉴 입력값을 확인해주세요.","error");if(menus.some((menu)=>menu.name.toLowerCase()===name.toLowerCase()))return showToast("이미 등록된 메뉴입니다.","error");setBusy(elements.menuSaveButton,true,"메뉴 등록");try{await addDoc(collection(db,"menus"),{category,name,price,createdAt:serverTimestamp()});elements.menuForm.reset();showToast("메뉴가 등록되었습니다.")}catch(error){console.error(error);showToast("메뉴 등록에 실패했습니다.","error")}finally{setBusy(elements.menuSaveButton,false,"메뉴 등록")}});
      elements.saleMenu.addEventListener("change",updateSaleTotal); elements.saleQuantity.addEventListener("input",updateSaleTotal); elements.categoryFilter.addEventListener("change",renderSales);
      elements.salesForm.addEventListener("submit",async(event)=>{event.preventDefault();const menu=selectedMenu(),quantity=Number(elements.saleQuantity.value),date=elements.saleDate.value;if(!menu||!date||!Number.isInteger(quantity)||quantity<1)return showToast("매출 입력값을 확인해주세요.","error");const price=Number(menu.price),total=price*quantity;setBusy(elements.salesSaveButton,true,"매출 저장");try{await addDoc(collection(db,"sales"),{date,menuId:menu.id,menuName:menu.name,category:menu.category||"기타",quantity,price,total,createdAt:serverTimestamp()});elements.saleMenu.value="";elements.saleQuantity.value="1";updateSaleTotal();showToast("매출이 저장되었습니다.")}catch(error){console.error(error);showToast("매출 저장에 실패했습니다.","error")}finally{setBusy(elements.salesSaveButton,false,"매출 저장");elements.salesSaveButton.disabled=!menus.length}});
    }
  </script>
</body>
</html>
