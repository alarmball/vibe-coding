  <header class="topbar"><div class="wrap top-inner"><div class="brand"><span class="logo">🏃</span><span>RunMate</span></div><div class="auth"><div id="profile" class="profile"><img id="profilePhoto" alt="프로필"><span id="profileName"></span></div><button id="authButton" class="btn ghost">Google 로그인</button></div></div></header>

  <main id="communityPanel" class="wrap tab-panel active"><section class="hero"><div class="eyebrow">RUNNING COMMUNITY</div><h1>오늘의 달리기를 공유해요</h1><p>기록을 남기고 다른 러너에게 ⚡ 응원과 댓글을 보내보세요.</p></section><div class="community-layout"><aside class="card writer"><h2>오늘의 러닝 등록</h2><form id="recordForm"><div class="field"><label>러닝 날짜</label><input id="recordDate" class="input record-control" type="date" required disabled></div><div class="field"><label>장소</label><input id="recordLocation" class="input record-control" maxlength="60" required disabled></div><div class="two"><div class="field"><label>거리(km)</label><input id="recordDistance" class="input record-control" type="number" min="0.1" step="0.01" required disabled></div><div class="field"><label>시간(분)</label><input id="recordDuration" class="input record-control" type="number" min="1" required disabled></div></div><div class="field"><label>메모</label><textarea id="recordMemo" class="input record-control" maxlength="300" disabled></textarea></div><button id="recordSubmit" class="btn" style="width:100%" disabled>기록 등록</button></form></aside><section><div class="section-head"><h2>실시간 러닝 피드</h2><span id="recordCount" class="count">0개의 기록</span></div><div id="recordList" class="record-list"><div class="empty">기록을 불러오는 중입니다.</div></div></section></div></main>

  <main id="matePanel" class="wrap tab-panel"><section class="hero"><div class="hero-row"><div><div class="eyebrow">FIND YOUR PACEMATE</div><h1>함께 달릴 러닝메이트를 찾아요</h1><p>지역과 페이스가 맞는 러너를 만나 함께 달려보세요.</p></div><button id="openCreate" class="btn" disabled>+ 모집글 작성</button></div></section><div id="loginNote" class="notice">로그인 전에는 모집글 목록만 볼 수 있습니다. 상세·작성·신청·채팅은 로그인 후 이용해주세요.</div><div class="section-head"><h2>🔥 러닝메이트 모집</h2><span id="postCount" class="count">0개의 모집</span></div><section id="postList" class="grid"><div class="empty">모집글을 불러오는 중입니다.</div></section></main>

  <div id="createModal" class="modal"><section class="dialog"><header class="dialog-head"><h2>러닝메이트 모집하기</h2><button class="close" data-close="createModal">×</button></header><div class="dialog-body"><form id="createForm" class="form-grid"><div class="field full"><label>모집 제목</label><input id="title" class="input" maxlength="60" required></div><div class="field"><label>날짜</label><input id="runDate" class="input" type="date" required></div><div class="field"><label>시간</label><input id="runTime" class="input" type="time" required></div><div class="field full"><label>장소</label><input id="location" class="input" maxlength="80" required></div><div class="field"><label>페이스</label><input id="pace" class="input" placeholder="예: 6'00\"/km" required></div><div class="field"><label>모집인원</label><input id="capacity" class="input" type="number" min="2" max="100" value="4" required></div><div class="field full"><label>상세 내용</label><textarea id="content" class="input" maxlength="1000" required></textarea></div><div class="field full"><button id="createSubmit" class="btn" style="width:100%">모집글 등록</button></div></form></div></section></div>
  <div id="detailModal" class="modal"><section class="dialog"><header class="dialog-head"><h2>모집 상세</h2><button class="close" data-close="detailModal">×</button></header><div id="detailBody" class="dialog-body"></div></section></div><div id="toast" class="toast" role="status"></div>

    document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{document.querySelectorAll(".tab,.tab-panel").forEach(x=>x.classList.remove("active"));b.classList.add("active");$(b.dataset.tab).classList.add("active")});

    onValue(dbQuery(ref(db,"posts"),orderByChild("createdAt")),s=>{posts=s.val()||{};renderPosts()});function renderPosts(){const es=Object.entries(posts).sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0));$("postCount").textContent=`${es.length}개의 모집`;$("postList").replaceChildren();if(!es.length){$("postList").append(make("div","empty","아직 모집글이 없습니다."));return}es.forEach(([id,p])=>{const c=make("article","card post"),top=make("div","post-top"),left=make("div"),h=make("h3","",p.title),host=make("div","host"),im=document.createElement("img"),facts=make("div","facts");im.src=photo(p.hostPhoto);host.append(im,make("span","",p.hostName||"러너"));left.append(h,host);top.append(left,make("span","status","모집중"));[["날짜·시간",`${p.date} ${p.time}`],["장소",p.location],["페이스",p.pace],["모집인원",`${p.capacity}명`]].forEach(([a,b])=>{const f=make("div","fact");f.append(make("small","",a),make("strong","",b));facts.append(f)});c.append(top,facts);c.onclick=()=>user?openDetail(id):toast("상세페이지는 로그인 후 볼 수 있습니다.","error");$("postList").append(c)})}
    function cleanupDetail(){[stopDetail,stopParticipants,stopChat].forEach(f=>f&&f());stopDetail=stopParticipants=stopChat=null}function closeDetail(){cleanupDetail();close("detailModal")}
    function openDetail(id){cleanupDetail();const p=posts[id];$("detailBody").replaceChildren();const title=make("h2","detail-title",p.title),host=make("div","host"),im=document.createElement("img"),facts=make("div","detail-facts"),body=make("p","detail-text","불러오는 중..."),row=make("div","apply-row"),members=make("span","members","참가자 확인 중..."),apply=make("button","btn green","참가 신청"),chat=make("section","chat"),messages=make("div","messages"),form=make("form","chat-form"),input=document.createElement("input"),send=make("button","btn","전송");im.src=photo(p.hostPhoto);host.append(im,make("span","",`${p.hostName} 님의 모집`));[["날짜·시간",`${p.date} ${p.time}`],["장소",p.location],["페이스",p.pace]].forEach(([a,b])=>{const f=make("div","detail-fact");f.append(make("small","",a),make("strong","",b));facts.append(f)});row.append(members,apply);input.className="input";input.placeholder="메시지를 입력하세요";form.append(input,send);chat.append(make("h3","","💬 러닝메이트 채팅방"),messages,form);$("detailBody").append(title,host,facts,body,row,chat);open("detailModal");stopDetail=onValue(ref(db,`postDetails/${id}`),s=>body.textContent=s.val()?.content||"");stopParticipants=onValue(ref(db,`participants/${id}`),s=>{const people=s.val()||{},joined=!!people[user.uid],n=Object.keys(people).length;members.textContent=`참가 ${n} / ${p.capacity}명`;apply.textContent=joined?"신청 취소":"참가 신청";apply.disabled=!joined&&n>=p.capacity});apply.onclick=()=>runTransaction(ref(db,`participants/${id}/${user.uid}`),v=>v?null:{name:user.displayName||user.email,photo:user.photoURL||"",joinedAt:Date.now()});stopChat=onValue(dbQuery(ref(db,`chats/${id}`),orderByChild("createdAt")),s=>{messages.replaceChildren();Object.values(s.val()||{}).sort((a,b)=>a.createdAt-b.createdAt).forEach(m=>{const r=make("div","message"),i=document.createElement("img"),b=make("div","bubble");i.src=photo(m.photo);b.append(make("b","",m.name),make("span","",m.text));r.append(i,b);messages.append(r)})});form.onsubmit=async e=>{e.preventDefault();const v=input.value.trim();if(!v)return;await push(ref(db,`chats/${id}`),{uid:user.uid,name:user.displayName||user.email,photo:user.photoURL||"",text:v,createdAt:dbTimestamp()});input.value=""}}
  </script>
