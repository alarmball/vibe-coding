<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Profile Cards - Firebase SDK Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Pretendard Font -->
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(16px) scale(0.98)' },
                            '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        /* Custom scrollbar for aesthetic feel */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 antialiased flex flex-col selection:bg-indigo-500 selection:text-white">

    <!-- Header Area -->
    <header class="glass-card sticky top-0 z-40 border-b border-slate-200/50">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-gradient-to-tr from-indigo-600 to-purple-600 rounded-xl shadow-md text-white">
                    <svg class="w-6 h-6 animate-pulse-slow" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">Vibe Profile Board</h1>
                    <p class="text-xs text-slate-500 font-medium">Firebase SDK v10 • Realtime Sync</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-emerald-50 text-emerald-700 border border-emerald-200">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
                    Firebase Connected
                </span>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-8 sm:px-6 lg:px-8 flex flex-col lg:flex-row gap-8">
        
        <!-- Left Side: Registration Form -->
        <section class="w-full lg:w-[380px] shrink-0">
            <div class="glass-card rounded-2xl shadow-xl p-6 border border-white sticky top-24 transition-all duration-300">
                <h2 class="text-lg font-bold text-slate-800 mb-1 flex items-center gap-2">
                    <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                    </svg>
                    새 프로필 등록
                </h2>
                <p class="text-xs text-slate-500 mb-6">새로운 프로필을 등록하여 실시간으로 반영해보세요.</p>

                <form id="profile-form" class="space-y-4">
                    <div>
                        <label for="input-name" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">이름 *</label>
                        <input type="text" id="input-name" required placeholder="예: 홍길동"
                               class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition duration-200 text-sm bg-white/70">
                    </div>

                    <div>
                        <label for="input-major" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">소속 / 전공 *</label>
                        <input type="text" id="input-major" required placeholder="예: 컴퓨터공학과, UI/UX 디자이너"
                               class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition duration-200 text-sm bg-white/70">
                    </div>

                    <div>
                        <label for="input-hobby" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">취미 / 관심사 *</label>
                        <input type="text" id="input-hobby" required placeholder="예: 등산, 사진 촬영, 코딩"
                               class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition duration-200 text-sm bg-white/70">
                    </div>

                    <div>
                        <label for="input-bio" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">소개글</label>
                        <textarea id="input-bio" rows="3" placeholder="간단한 자신만의 소개를 적어주세요."
                                  class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition duration-200 text-sm bg-white/70 resize-none"></textarea>
                    </div>

                    <button type="submit" id="submit-btn"
                            class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md hover:shadow-lg transition-all duration-200 flex items-center justify-center gap-2 text-sm mt-6 group">
                        <span>프로필 카드 생성</span>
                        <svg class="w-4 h-4 transform group-hover:translate-x-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                        </svg>
                    </button>
                </form>
            </div>
        </section>

        <!-- Right Side: Dashboard Cards List -->
        <section class="flex-grow flex flex-col gap-6">
            
            <!-- Toast notification / feedback area -->
            <div id="toast-container" class="hidden transition-all duration-300">
                <div id="toast-body" class="p-4 rounded-xl flex items-start gap-3 shadow-md border">
                    <!-- Dynamic icons will be placed here -->
                    <div id="toast-content" class="text-sm"></div>
                </div>
            </div>

            <!-- Header of profiles listing -->
            <div class="flex items-center justify-between pb-2 border-b border-slate-200/60">
                <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <span>등록된 프로필</span>
                    <span id="profile-count" class="px-2.5 py-0.5 bg-indigo-100 text-indigo-700 text-xs font-bold rounded-full">0</span>
                </h2>
                
                <button id="seed-btn" class="hidden text-xs text-indigo-600 hover:text-indigo-800 font-semibold flex items-center gap-1 transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                    </svg>
                    샘플 데모 데이터 추가
                </button>
            </div>

            <!-- Loading Skeleton Grid -->
            <div id="skeleton-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Skeleton Card 1 -->
                <div class="glass-card rounded-2xl p-6 border border-white flex flex-col items-center text-center animate-pulse">
                    <div class="w-20 h-20 bg-slate-200 rounded-full mb-4"></div>
                    <div class="h-5 bg-slate-200 rounded w-1/3 mb-2"></div>
                    <div class="h-6 bg-slate-100 rounded-full w-1/2 mb-4"></div>
                    <div class="h-4 bg-slate-200 rounded w-4/5 mb-2"></div>
                    <div class="h-4 bg-slate-200 rounded w-2/3 mb-6"></div>
                    <div class="h-8 bg-slate-200 rounded w-1/4 mt-auto"></div>
                </div>
                <!-- Skeleton Card 2 -->
                <div class="glass-card rounded-2xl p-6 border border-white flex flex-col items-center text-center animate-pulse">
                    <div class="w-20 h-20 bg-slate-200 rounded-full mb-4"></div>
                    <div class="h-5 bg-slate-200 rounded w-1/3 mb-2"></div>
                    <div class="h-6 bg-slate-100 rounded-full w-1/2 mb-4"></div>
                    <div class="h-4 bg-slate-200 rounded w-4/5 mb-2"></div>
                    <div class="h-4 bg-slate-200 rounded w-2/3 mb-6"></div>
                    <div class="h-8 bg-slate-200 rounded w-1/4 mt-auto"></div>
                </div>
            </div>

            <!-- Empty State UI -->
            <div id="empty-state" class="hidden flex-col items-center justify-center py-20 px-6 glass-card rounded-2xl border border-white text-center animate-fade-in-up">
                <div class="w-20 h-20 bg-indigo-50 border border-indigo-100 rounded-2xl flex items-center justify-center text-indigo-500 mb-6 shadow-inner">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-slate-800 mb-2">등록된 프로필 카드가 없습니다</h3>
                <p class="text-sm text-slate-500 max-w-sm mb-8">오른쪽 양식을 통해 첫 번째 프로필을 만들어보거나, 아래 버튼을 눌러 샘플 데모 데이터를 생성해보세요!</p>
                <button id="empty-seed-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2 text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                    </svg>
                    샘플 데모 데이터로 시작하기
                </button>
            </div>

            <!-- Profile Cards Grid -->
            <div id="profiles-grid" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Cards will render here dynamically -->
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="mt-auto border-t border-slate-200/50 bg-white/40 py-6 text-center text-xs text-slate-400">
        <p>© 2026 Vibe Profile App. Built with Firebase JS SDK v10 Modular.</p>
    </footer>

    <!-- Firebase App & Firestore JS SDK Modules integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";

        // Firebase Configuration (from user)
        const firebaseConfig = {
            apiKey: "AIzaSyBH9wy8EMJnc8VK2qKJAQhQcO5HCKOEawI",
            authDomain: "vibe-coding-88fba.firebaseapp.com",
            projectId: "vibe-coding-88fba",
            storageBucket: "vibe-coding-88fba.firebasestorage.app",
            messagingSenderId: "712429656291",
            appId: "1:712429656291:web:3ee6e576f554628dd94dd6",
            measurementId: "G-TFPF1DNPDK"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Initialize Analytics safely (analytics requires cookies/HTTPS and can throw error locally)
        let analytics;
        try {
            analytics = getAnalytics(app);
        } catch (e) {
            console.warn("Analytics not initialized in this environment:", e.message);
        }

        // DOM elements
        const profileForm = document.getElementById('profile-form');
        const submitBtn = document.getElementById('submit-btn');
        const profilesGrid = document.getElementById('profiles-grid');
        const skeletonGrid = document.getElementById('skeleton-grid');
        const emptyState = document.getElementById('empty-state');
        const profileCountBadge = document.getElementById('profile-count');
        
        // Seed buttons
        const seedBtn = document.getElementById('seed-btn');
        const emptySeedBtn = document.getElementById('empty-seed-btn');

        // Toast setup
        const toastContainer = document.getElementById('toast-container');
        const toastBody = document.getElementById('toast-body');
        const toastContent = document.getElementById('toast-content');

        // Helper: show notifications/toast
        function showToast(message, type = 'success') {
            toastContainer.classList.remove('hidden');
            
            // Clean classes
            toastBody.className = "p-4 rounded-xl flex items-start gap-3 shadow-md border transition-all duration-300 animate-fade-in-up ";
            
            if (type === 'success') {
                toastBody.classList.add('bg-emerald-50', 'text-emerald-800', 'border-emerald-200');
                toastBody.innerHTML = `
                    <svg class="w-5 h-5 text-emerald-600 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <div class="text-sm font-medium">${message}</div>
                `;
            } else if (type === 'error') {
                toastBody.classList.add('bg-rose-50', 'text-rose-800', 'border-rose-200');
                toastBody.innerHTML = `
                    <svg class="w-5 h-5 text-rose-600 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <div class="text-sm font-medium">${message}</div>
                `;
            } else {
                toastBody.classList.add('bg-indigo-50', 'text-indigo-800', 'border-indigo-200');
                toastBody.innerHTML = `
                    <svg class="w-5 h-5 text-indigo-600 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <div class="text-sm font-medium">${message}</div>
                `;
            }

            // Auto dismiss toast after 4s
            setTimeout(() => {
                toastContainer.classList.add('hidden');
            }, 4000);
        }

        // Avatar gradient collection
        const avatarGradients = [
            'from-pink-500 to-rose-500',
            'from-purple-500 to-indigo-500',
            'from-indigo-500 to-blue-500',
            'from-cyan-500 to-teal-500',
            'from-emerald-500 to-green-500',
            'from-amber-500 to-orange-500',
        ];

        // Seed data samples
        const sampleProfiles = [
            {
                name: "김민수",
                major: "컴퓨터소프트웨어공학",
                hobby: "독서, 알고리즘 문제 풀이",
                bio: "안녕하세요! 백엔드 개발자를 꿈꾸는 대학생 김민수입니다. 스프링과 데이터베이스 학습을 즐겨 합니다.",
                createdAt: serverTimestamp()
            },
            {
                name: "이지은",
                major: "시각정보디자인과",
                hobby: "아이패드 드로잉, 필라테스",
                bio: "사용자의 마음을 움직이는 UI/UX 디자이너 이지은입니다. 피그마 컴포넌트 설계와 디자인 시스템 구축에 관심이 많습니다.",
                createdAt: serverTimestamp()
            },
            {
                name: "박준영",
                major: "스타트업 창업가 / 기획",
                hobby: "테니스, 맛집 탐방",
                bio: "사람들의 실질적인 문제를 IT 서비스로 해결하고자 하는 주니어 서비스 기획자 박준영입니다. 네트워킹을 좋아해요!",
                createdAt: serverTimestamp()
            }
        ];

        // Seeding function
        async function seedDemoData() {
            try {
                showToast("샘플 데모 데이터를 생성하는 중...", "info");
                for (const profile of sampleProfiles) {
                    await addDoc(collection(db, "profiles"), profile);
                }
                showToast("성공적으로 3개의 샘플 프로필을 추가했습니다!");
            } catch (err) {
                console.error("Error seeding data:", err);
                showToast("데이터 추가 실패: " + err.message, "error");
            }
        }

        seedBtn.addEventListener('click', seedDemoData);
        emptySeedBtn.addEventListener('click', seedDemoData);

        // Listen for Firestore updates in real-time
        const profilesRef = collection(db, "profiles");
        // Order by creation time (descending: newest profiles first)
        const q = query(profilesRef, orderBy("createdAt", "desc"));

        onSnapshot(q, (snapshot) => {
            // Hide loading states
            skeletonGrid.classList.add('hidden');
            
            // Clear current cards container
            profilesGrid.innerHTML = '';
            
            const totalDocs = snapshot.docs.length;
            profileCountBadge.textContent = totalDocs;

            if (totalDocs === 0) {
                profilesGrid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                seedBtn.classList.add('hidden');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
                profilesGrid.classList.remove('hidden');
                seedBtn.classList.remove('hidden');

                // Render each profile document
                snapshot.docs.forEach((docSnap, index) => {
                    const profileData = docSnap.data();
                    const docId = docSnap.id;
                    
                    const name = profileData.name || "이름 없음";
                    const major = profileData.major || "소속 없음";
                    const hobby = profileData.hobby || "취미 없음";
                    const bio = profileData.bio || "아직 소개글이 등록되지 않았습니다.";
                    
                    // Consistent avatar color per profile using charCode hash
                    const charCodeSum = name.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
                    const gradientIndex = charCodeSum % avatarGradients.length;
                    const avatarGradient = avatarGradients[gradientIndex];
                    const initialChar = name.charAt(0);

                    // Create card element
                    const card = document.createElement('div');
                    card.className = "glass-card rounded-2xl p-6 shadow-sm hover:shadow-xl hover:-translate-y-1.5 transition-all duration-300 flex flex-col relative border border-white group animate-fade-in-up";
                    card.style.animationDelay = `${index * 0.05}s`;

                    card.innerHTML = `
                        <!-- Delete Button (Top Right) -->
                        <button class="delete-btn absolute top-4 right-4 p-2 rounded-full text-slate-400 hover:text-rose-600 hover:bg-rose-50 transition-all duration-200 opacity-0 group-hover:opacity-100 focus:opacity-100" data-id="${docId}">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                            </svg>
                        </button>
                        
                        <!-- Top Info with Avatar -->
                        <div class="flex items-center gap-4 mb-4">
                            <div class="w-14 h-14 bg-gradient-to-tr ${avatarGradient} rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-inner shrink-0 select-none">
                                ${initialChar}
                            </div>
                            <div class="overflow-hidden">
                                <h3 class="font-bold text-slate-800 text-lg truncate">${name}</h3>
                                <span class="inline-block max-w-full text-xs font-semibold px-2.5 py-1 bg-indigo-50 border border-indigo-100 text-indigo-600 rounded-lg truncate mt-0.5">
                                    ${major}
                                </span>
                            </div>
                        </div>
                        
                        <!-- Description/Bio -->
                        <p class="text-sm text-slate-600 leading-relaxed mb-6 font-normal line-clamp-3">
                            ${bio}
                        </p>
                        
                        <!-- Hobby / Footer Section -->
                        <div class="mt-auto pt-4 border-t border-slate-100 flex items-center gap-2 text-slate-500">
                            <svg class="w-4 h-4 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                            </svg>
                            <span class="text-xs font-medium truncate">관심사: ${hobby}</span>
                        </div>
                    `;

                    profilesGrid.appendChild(card);
                });

                // Attach delete button event listeners
                document.querySelectorAll('.delete-btn').forEach(button => {
                    button.addEventListener('click', async (e) => {
                        const targetButton = e.currentTarget;
                        const id = targetButton.getAttribute('data-id');
                        
                        if (confirm("정말 이 프로필을 삭제하시겠습니까?")) {
                            try {
                                targetButton.disabled = true;
                                await deleteDoc(doc(db, "profiles", id));
                                showToast("프로필이 성공적으로 삭제되었습니다.");
                            } catch (err) {
                                console.error("Error deleting document:", err);
                                showToast("삭제 중 오류가 발생했습니다: " + err.message, "error");
                                targetButton.disabled = false;
                            }
                        }
                    });
                });
            }
        }, (error) => {
            console.error("Firestore loading error:", error);
            skeletonGrid.classList.add('hidden');
            showToast("데이터베이스 로드 중 권한 에러 또는 프로젝트 설정 오류가 발생했습니다.<br>보안 규칙(Rule) 및 환경을 검토해 주세요.", "error");
        });

        // Add Profile Card handler
        profileForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nameVal = document.getElementById('input-name').value.trim();
            const majorVal = document.getElementById('input-major').value.trim();
            const hobbyVal = document.getElementById('input-hobby').value.trim();
            const bioVal = document.getElementById('input-bio').value.trim();

            if (!nameVal || !majorVal || !hobbyVal) {
                showToast("필수 값을 올바르게 입력해주세요.", "error");
                return;
            }

            // Disable submit button during save
            submitBtn.disabled = true;
            const originalBtnContent = submitBtn.innerHTML;
            submitBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                저장 중...
            `;

            try {
                const newProfile = {
                    name: nameVal,
                    major: majorVal,
                    hobby: hobbyVal,
                    bio: bioVal,
                    createdAt: serverTimestamp() // Firebase server side timestamp
                };

                await addDoc(collection(db, "profiles"), newProfile);
                
                showToast(`"${nameVal}"님의 프로필 카드가 추가되었습니다!`);
                profileForm.reset();
            } catch (err) {
                console.error("Error adding document:", err);
                showToast("프로필 등록에 실패했습니다: " + err.message, "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnContent;
            }
        });
    </script>
</body>
</html>
