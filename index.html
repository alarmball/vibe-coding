<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 카페 | 매출 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#26342d;--muted:#738078;--paper:#f7f3ea;--card:#fffdf8;--green:#315c47;--green2:#47745b;--cream:#eadfc9;--orange:#d77942;--red:#b44b42;--line:#dfded6;--shadow:0 18px 50px rgba(48,62,52,.09)}
    *{box-sizing:border-box} body{margin:0;color:var(--ink);background:radial-gradient(circle at 5% 5%,#efe1c7 0,transparent 25%),var(--paper);font-family:Manrope,"Gowun Dodum",sans-serif}
    button,input,select{font:inherit} button{cursor:pointer}.shell{width:min(1440px,calc(100% - 40px));margin:auto}
    header{padding:28px 0 18px}.topbar{display:flex;justify-content:space-between;align-items:center}.brand{display:flex;gap:13px;align-items:center}.logo{display:grid;place-items:center;width:48px;height:48px;border-radius:16px;background:var(--green);font-size:24px;box-shadow:var(--shadow)}
    h1,h2,p{margin:0} h1{font-size:24px;letter-spacing:-.6px}.subtitle{margin-top:5px;color:var(--muted);font-size:13px}.live{display:flex;align-items:center;gap:8px;padding:9px 13px;border:1px solid #c9d8cf;border-radius:999px;background:#f4faf6;color:var(--green);font-size:12px;font-weight:800}.dot{width:8px;height:8px;border-radius:50%;background:#36a269;box-shadow:0 0 0 5px #dcefe4}
    .layout{display:grid;grid-template-columns:minmax(0,1.7fr) minmax(340px,.75fr);gap:22px;padding:15px 0 50px}.main,.side{display:flex;flex-direction:column;gap:22px}.card{overflow:hidden;border:1px solid rgba(73,91,79,.13);border-radius:24px;background:rgba(255,253,248,.92);box-shadow:var(--shadow);backdrop-filter:blur(12px)}
    .card-head{display:flex;justify-content:space-between;align-items:center;padding:22px 24px;border-bottom:1px solid var(--line)}.card-head h2{font-size:18px}.eyebrow{margin-bottom:6px;color:var(--orange);font-size:11px;font-weight:800;letter-spacing:1.4px}.date{color:var(--muted);font-size:12px}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.stat{position:relative;overflow:hidden;padding:22px;border-radius:22px;color:#fff;background:var(--green)}.stat:nth-child(2){background:#b56e43}.stat:nth-child(3){background:#3b4a42}.stat:after{content:"";position:absolute;right:-20px;bottom:-32px;width:95px;height:95px;border:20px solid rgba(255,255,255,.09);border-radius:50%}.stat span{font-size:12px;opacity:.75}.stat strong{display:block;margin-top:13px;font-size:27px;letter-spacing:-1px}
    .body{padding:22px 24px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}.field{margin-bottom:15px}.field.full{grid-column:1/-1}.field label{display:block;margin:0 0 7px;font-size:12px;font-weight:800}.control{width:100%;height:46px;padding:0 13px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);outline:none}.control:focus{border-color:var(--green2);box-shadow:0 0 0 4px rgba(71,116,91,.1)}
    .btn{min-height:46px;padding:0 17px;border:0;border-radius:12px;background:var(--green);color:#fff;font-weight:800;transition:.18s}.btn:hover{transform:translateY(-1px);background:#244c39}.btn:disabled{cursor:not-allowed;opacity:.5;transform:none}.btn.full{width:100%}.btn.danger{min-height:32px;padding:0 11px;background:#fff0ed;color:var(--red);font-size:11px}.btn.ghost{background:#eef2ef;color:var(--green)}
    .preview{display:none;margin:3px 0 16px;padding:16px;border-radius:15px;background:#f0ece2}.preview.show{display:block}.preview-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px}.preview-row:last-child{margin:12px 0 0;padding-top:12px;border-top:1px dashed #c8c1b3;font-size:14px}.discount{color:var(--red)}
    .menu-list{display:flex;flex-direction:column;gap:9px;max-height:310px;margin-top:18px;overflow:auto}.menu-item{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:13px;border:1px solid var(--line);border-radius:14px}.menu-name{font-size:13px;font-weight:800}.menu-price{margin-top:4px;color:var(--muted);font-size:11px}.badge{margin-left:5px;padding:3px 6px;border-radius:6px;background:#fff0ed;color:var(--red);font-size:10px;font-weight:800}
    .table-wrap{overflow:auto;padding:0 24px 24px}table{width:100%;min-width:720px;border-collapse:collapse}th,td{padding:15px 10px;border-bottom:1px solid var(--line);text-align:left;font-size:12px}th{color:var(--muted);font-size:10px;letter-spacing:.5px}td.amount{color:var(--green);font-size:13px;font-weight:800}.empty{text-align:center!important;padding:45px!important;color:var(--muted)}
    .toast{position:fixed;right:24px;bottom:24px;z-index:5;max-width:360px;padding:14px 18px;border-radius:12px;background:var(--green);color:#fff;box-shadow:var(--shadow);opacity:0;transform:translateY(15px);pointer-events:none;transition:.25s;font-size:13px}.toast.show{opacity:1;transform:none}.toast.error{background:var(--red)}
    @media(max-width:1000px){.layout{grid-template-columns:1fr}.side{display:grid;grid-template-columns:1fr 1fr}}@media(max-width:700px){.shell{width:min(100% - 24px,1440px)}.topbar{align-items:flex-start}.live{display:none}.layout,.side{display:flex}.stats{grid-template-columns:1fr}.card-head{padding:19px}.body,.table-wrap{padding-left:19px;padding-right:19px}.grid2{grid-template-columns:1fr}.field.full{grid-column:auto}}
  </style>
</head>
<body>
  <header class="shell"><div class="topbar"><div class="brand"><div class="logo">☕</div><div><h1>오늘의 카페</h1><p class="subtitle">메뉴부터 주문, 매출까지 한 곳에서 관리하세요.</p></div></div><div class="live"><span class="dot"></span>FIRESTORE LIVE</div></div></header>
  <main class="shell layout">
    <div class="main">
      <section class="stats"><article class="stat"><span>전체 주문</span><strong id="orderCount">0건</strong></article><article class="stat"><span>판매 수량</span><strong id="quantityTotal">0개</strong></article><article class="stat"><span>누적 매출</span><strong id="salesTotal">0원</strong></article></section>
      <section class="card"><div class="card-head"><div><p class="eyebrow">SALES HISTORY</p><h2>매출 내역</h2></div><span class="date" id="today"></span></div><div class="table-wrap"><table><thead><tr><th>주문 일시</th><th>메뉴</th><th>단가</th><th>수량</th><th>결제 금액</th><th>관리</th></tr></thead><tbody id="salesBody"><tr><td colspan="6" class="empty">매출 내역을 불러오는 중입니다.</td></tr></tbody></table></div></section>
    </div>
    <aside class="side">
      <section class="card"><div class="card-head"><div><p class="eyebrow">NEW ORDER</p><h2>주문 등록</h2></div></div><div class="body"><form id="orderForm"><div class="field"><label for="orderMenu">메뉴</label><select id="orderMenu" class="control" required disabled><option>메뉴 로딩 중...</option></select></div><div class="field"><label for="orderQuantity">수량</label><input id="orderQuantity" class="control" type="number" min="1" max="99" value="1" required></div><div id="preview" class="preview"><div class="preview-row"><span>메뉴 가격</span><strong id="previewPrice">0원</strong></div><div class="preview-row"><span>할인율</span><strong id="previewDiscount" class="discount">0%</strong></div><div class="preview-row"><span>최종 결제</span><strong id="previewTotal">0원</strong></div></div><button id="orderButton" class="btn full" disabled>주문 저장하기</button></form></div></section>
      <section class="card"><div class="card-head"><div><p class="eyebrow">MENU SETTINGS</p><h2>메뉴 관리</h2></div></div><div class="body"><form id="menuForm" class="grid2"><div class="field full"><label for="menuName">메뉴명</label><input id="menuName" class="control" maxlength="50" placeholder="예: 아메리카노" required></div><div class="field"><label for="menuPrice">가격</label><input id="menuPrice" class="control" type="number" min="0" step="100" placeholder="4500" required></div><div class="field"><label for="menuDiscount">할인율 (%)</label><input id="menuDiscount" class="control" type="number" min="0" max="100" value="0" required></div><button id="menuButton" class="btn full" type="submit">메뉴 추가</button></form><div id="menuList" class="menu-list"><div class="empty">메뉴를 불러오는 중입니다.</div></div></div></section>
    </aside>
  </main><div id="toast" class="toast" role="status"></div>
  <script type="module">
    import {initializeApp} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import {getFirestore,collection,addDoc,deleteDoc,doc,onSnapshot,query,orderBy,serverTimestamp} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
    const firebaseConfig={apiKey:"AIzaSyBH9wy8EMJnc8VK2qKJAQhQcO5HCKOEawI",authDomain:"vibe-coding-88fba.firebaseapp.com",projectId:"vibe-coding-88fba"};
    const db=getFirestore(initializeApp(firebaseConfig));
    const MENU_COLLECTION="cafeMenus", SALES_COLLECTION="cafeSales";
    const el=id=>document.getElementById(id), money=value=>`${Number(value||0).toLocaleString("ko-KR")}원`;
    const nodes={orderForm:el("orderForm"),orderMenu:el("orderMenu"),orderQuantity:el("orderQuantity"),orderButton:el("orderButton"),menuForm:el("menuForm"),menuName:el("menuName"),menuPrice:el("menuPrice"),menuDiscount:el("menuDiscount"),menuButton:el("menuButton"),menuList:el("menuList"),salesBody:el("salesBody"),preview:el("preview"),toast:el("toast")};
    let menus=[],toastTimer;
    el("today").textContent=new Intl.DateTimeFormat("ko-KR",{dateStyle:"long"}).format(new Date());
    function toast(message,type="success"){clearTimeout(toastTimer);nodes.toast.textContent=message;nodes.toast.className=`toast ${type} show`;toastTimer=setTimeout(()=>nodes.toast.classList.remove("show"),2500)}
    function finalPrice(menu){return Math.round(Number(menu.price)*(1-Number(menu.discount||0)/100))}
    function selectedMenu(){return menus.find(menu=>menu.id===nodes.orderMenu.value)}
    function updatePreview(){const menu=selectedMenu();if(!menu){nodes.preview.classList.remove("show");return}const quantity=Math.max(1,Number(nodes.orderQuantity.value)||1);el("previewPrice").textContent=`${money(menu.price)} × ${quantity}`;el("previewDiscount").textContent=`${Number(menu.discount||0)}%`;el("previewTotal").textContent=money(finalPrice(menu)*quantity);nodes.preview.classList.add("show")}
    function renderMenus(){nodes.orderMenu.innerHTML=menus.length?`<option value="">메뉴를 선택하세요</option>`:"<option value=''>먼저 메뉴를 등록하세요</option>";for(const menu of menus){const option=document.createElement("option");option.value=menu.id;option.textContent=`${menu.name} - ${money(finalPrice(menu))}${menu.discount?` (${menu.discount}% 할인)`:""}`;nodes.orderMenu.append(option)}nodes.orderMenu.disabled=!menus.length;nodes.orderButton.disabled=!menus.length;nodes.menuList.replaceChildren();if(!menus.length){nodes.menuList.innerHTML='<div class="empty">등록된 메뉴가 없습니다.</div>';return}for(const menu of menus){const item=document.createElement("article");item.className="menu-item";const info=document.createElement("div");info.innerHTML=`<div class="menu-name"></div><div class="menu-price">${money(finalPrice(menu))}${menu.discount?`<span class="badge">${menu.discount}% 할인</span>`:""}</div>`;info.querySelector(".menu-name").textContent=menu.name;const button=document.createElement("button");button.className="btn danger";button.textContent="삭제";button.onclick=()=>removeDocument(MENU_COLLECTION,menu.id,`“${menu.name}” 메뉴를 삭제할까요?`,button);item.append(info,button);nodes.menuList.append(item)}}
    async function removeDocument(collectionName,id,message,button){if(!confirm(message))return;button.disabled=true;try{await deleteDoc(doc(db,collectionName,id));toast("삭제되었습니다.")}catch(error){console.error(error);toast("삭제하지 못했습니다. Firestore 권한을 확인하세요.","error");button.disabled=false}}
    onSnapshot(query(collection(db,MENU_COLLECTION),orderBy("name")),snapshot=>{menus=snapshot.docs.map(item=>({id:item.id,...item.data()}));renderMenus()},error=>{console.error(error);nodes.menuList.innerHTML='<div class="empty">메뉴 조회 실패<br>Firestore 규칙을 확인하세요.</div>';toast("메뉴를 불러오지 못했습니다.","error")});
    nodes.menuForm.addEventListener("submit",async event=>{event.preventDefault();const name=nodes.menuName.value.trim(),price=Number(nodes.menuPrice.value),discount=Number(nodes.menuDiscount.value);if(menus.some(menu=>String(menu.name).toLowerCase()===name.toLowerCase()))return toast("이미 등록된 메뉴입니다.","error");if(!name||price<0||discount<0||discount>100)return toast("입력값을 확인해주세요.","error");nodes.menuButton.disabled=true;try{await addDoc(collection(db,MENU_COLLECTION),{name,price,discount,createdAt:serverTimestamp()});nodes.menuForm.reset();nodes.menuDiscount.value=0;toast("메뉴가 추가되었습니다.")}catch(error){console.error(error);toast("메뉴 저장에 실패했습니다.","error")}finally{nodes.menuButton.disabled=false}});
    nodes.orderMenu.addEventListener("change",updatePreview);nodes.orderQuantity.addEventListener("input",updatePreview);
    nodes.orderForm.addEventListener("submit",async event=>{event.preventDefault();const menu=selectedMenu(),quantity=Number(nodes.orderQuantity.value);if(!menu||!Number.isInteger(quantity)||quantity<1)return toast("메뉴와 수량을 확인해주세요.","error");const price=finalPrice(menu);nodes.orderButton.disabled=true;try{await addDoc(collection(db,SALES_COLLECTION),{menuId:menu.id,menu:menu.name,originalPrice:Number(menu.price),discount:Number(menu.discount||0),price,quantity,total:price*quantity,createdAt:serverTimestamp()});nodes.orderForm.reset();nodes.orderQuantity.value=1;nodes.preview.classList.remove("show");toast(`${menu.name} ${quantity}개 주문이 저장되었습니다.`)}catch(error){console.error(error);toast("주문 저장에 실패했습니다.","error")}finally{nodes.orderButton.disabled=!menus.length}});
    function renderSales(sales){el("orderCount").textContent=`${sales.length.toLocaleString()}건`;el("quantityTotal").textContent=`${sales.reduce((sum,sale)=>sum+Number(sale.quantity||0),0).toLocaleString()}개`;el("salesTotal").textContent=money(sales.reduce((sum,sale)=>sum+Number(sale.total||0),0));nodes.salesBody.replaceChildren();if(!sales.length){nodes.salesBody.innerHTML='<tr><td colspan="6" class="empty">아직 등록된 매출이 없습니다.</td></tr>';return}for(const sale of sales){const row=document.createElement("tr"),date=sale.createdAt?.toDate?.().toLocaleString("ko-KR")||"저장 중...";row.innerHTML=`<td></td><td></td><td>${money(sale.price)}</td><td>${Number(sale.quantity).toLocaleString()}개</td><td class="amount">${money(sale.total)}</td><td></td>`;row.children[0].textContent=date;row.children[1].textContent=sale.menu||"-";const button=document.createElement("button");button.className="btn danger";button.textContent="삭제";button.onclick=()=>removeDocument(SALES_COLLECTION,sale.id,`“${sale.menu}” 주문을 삭제할까요?`,button);row.lastElementChild.append(button);nodes.salesBody.append(row)}}
    onSnapshot(query(collection(db,SALES_COLLECTION),orderBy("createdAt","desc")),snapshot=>renderSales(snapshot.docs.map(item=>({id:item.id,...item.data()}))),error=>{console.error(error);nodes.salesBody.innerHTML='<tr><td colspan="6" class="empty">매출 조회 실패 — Firestore 규칙을 확인하세요.</td></tr>';toast("매출을 불러오지 못했습니다.","error")});
  </script>
</body>
</html>
