<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Runners High</title>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--text:#202331;--muted:#73788b;--line:#e8eaf1;--primary:#6757e8;--primary-dark:#5141d1;--spark:#f6aa1c;--danger:#db4b57;--shadow:0 14px 42px rgba(49,45,90,.09)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(145deg,#f9f7ff,#f3f7fb);color:var(--text);font-family:Pretendard,"Noto Sans KR",Arial,sans-serif}button,input,textarea{font:inherit}button{cursor:pointer}.shell{width:min(1080px,100%);margin:auto;padding:0 22px}.topbar{position:sticky;top:0;z-index:10;border-bottom:1px solid rgba(232,234,241,.85);background:rgba(255,255,255,.88);backdrop-filter:blur(16px)}.topbar-inner{display:flex;justify-content:space-between;align-items:center;min-height:72px;gap:18px}.brand{display:flex;align-items:center;gap:11px;font-size:20px;font-weight:900}.brand-mark{display:grid;place-items:center;width:39px;height:39px;border-radius:13px;background:linear-gradient(135deg,#7d6df2,#5545d6);color:#fff}.auth-area{display:flex;align-items:center;gap:10px}.user-name{max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:13px}.button{min-height:42px;padding:0 16px;border:0;border-radius:11px;background:var(--primary);color:#fff;font-weight:800}.button:hover{background:var(--primary-dark)}.button:disabled{cursor:not-allowed;opacity:.5}.button.secondary{border:1px solid var(--line);background:#fff;color:var(--text)}
    .hero{padding:58px 0 35px;text-align:center}.hero small{display:inline-block;padding:6px 11px;border-radius:99px;background:#fff0df;color:#ed8617;font-weight:800}.hero h1{margin:16px 0 10px;font-size:clamp(30px,5vw,48px);letter-spacing:-.04em}.hero p{margin:0;color:var(--muted);line-height:1.7}.layout{display:grid;grid-template-columns:330px minmax(0,1fr);gap:24px;align-items:start;padding-bottom:70px}.panel,.record-card{border:1px solid var(--line);border-radius:20px;background:var(--card);box-shadow:var(--shadow)}.panel{position:sticky;top:94px;padding:22px}.panel h2{margin:0 0 5px;font-size:19px}.panel-desc{margin:0 0 20px;color:var(--muted);font-size:12px;line-height:1.6}.field{margin-bottom:14px}.field label{display:block;margin-bottom:7px;font-size:12px;font-weight:800}.input{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:11px;background:#fff;outline:none}.input:focus{border-color:#8c80ef;box-shadow:0 0 0 3px rgba(103,87,232,.11)}.input:disabled{cursor:not-allowed;border-color:#e5e6ec;background:#f1f2f6;color:#a2a5b0}.input:disabled::placeholder{color:#b5b7c0}.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.unit-field{position:relative}.unit-field .input{padding-right:42px}.unit{position:absolute;right:13px;bottom:13px;color:var(--muted);font-size:11px}.full{width:100%}.login-guide{display:none;margin-top:12px;padding:11px;border-radius:10px;background:#fff5e9;color:#dc7c12;font-size:12px;text-align:center}.login-guide.show{display:block}.feed-head{display:flex;justify-content:space-between;align-items:center;margin:0 2px 13px}.feed-head h2{margin:0;font-size:19px}.record-count{color:var(--muted);font-size:12px}.record-list{display:grid;gap:18px}.record-card{overflow:hidden}.record-main{padding:23px}.record-meta{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}.author{display:flex;align-items:center;gap:10px}.avatar{display:grid;place-items:center;width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#ffad45,#ff7b23);color:#fff;font-weight:900}.author-name{font-size:13px;font-weight:800}.date{margin-top:3px;color:var(--muted);font-size:11px}.tag{padding:5px 9px;border-radius:99px;background:#fff1e2;color:#df7c12;font-size:11px;font-weight:800}.metrics{display:grid;grid-template-columns:repeat(3,1fr);margin-bottom:15px;padding:16px 8px;border:1px solid #edf0f5;border-radius:15px;background:#fafbfe}.metric{text-align:center}.metric+.metric{border-left:1px solid var(--line)}.metric-label{display:block;margin-bottom:6px;color:#989cac;font-size:9px;font-weight:800;letter-spacing:.08em}.metric-value{font-size:18px;font-weight:900}.metric-value small{margin-left:3px;color:var(--muted);font-size:10px}.pace{color:var(--primary)}.record-content{margin:0;padding:13px 15px;border:1px dashed #e2e4eb;border-radius:12px;color:#555a6d;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}.record-actions{display:flex;align-items:center;margin-top:16px}.spark-button{display:inline-flex;align-items:center;gap:6px;height:39px;padding:0 13px;border:1px solid var(--line);border-radius:99px;background:#fff;color:#9a9dac;font-weight:900;transition:.16s}.spark-button:hover{border-color:#f5c968;background:#fffaf0}.spark-button.mine{border-color:#f4c34e;background:#fff4bf;color:#d68a00;box-shadow:0 0 0 3px rgba(246,170,28,.1)}.spark-icon{font-size:18px}.spark-count{font-variant-numeric:tabular-nums}.comments{border-top:1px solid var(--line);background:#fafbfe;padding:18px 23px 21px}.comments-title{margin:0 0 13px;font-size:13px}.comment-list{display:grid;gap:9px}.comment-empty{padding:9px 0 13px;color:#999dab;font-size:12px}.comment{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:11px 12px;border:1px solid var(--line);border-radius:11px;background:#fff}.comment-body{min-width:0}.comment-author{font-size:11px;font-weight:900}.comment-text{margin-top:4px;color:#555a6d;font-size:13px;line-height:1.5;white-space:pre-wrap;word-break:break-word}.comment-time{margin-left:6px;color:#a1a4b1;font-size:10px;font-weight:400}.comment-delete{flex:0 0 auto;padding:3px 5px;border:0;background:transparent;color:#a1a4b1;font-size:11px}.comment-delete:hover{color:var(--danger)}.comment-form{display:flex;gap:8px;margin-top:12px}.comment-form .input{min-width:0;padding:10px 12px}.comment-form .button{min-height:40px;flex:0 0 auto}.empty{padding:50px 20px;border:1px dashed #d9dbe5;border-radius:18px;color:var(--muted);text-align:center}.toast{position:fixed;right:22px;bottom:22px;z-index:30;max-width:350px;padding:14px 17px;border-radius:11px;background:#2c865c;color:#fff;box-shadow:var(--shadow);opacity:0;transform:translateY(12px);pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:none}.toast.error{background:var(--danger)}
    @media(max-width:760px){.shell{padding:0 15px}.layout{grid-template-columns:1fr}.panel{position:static}.hero{padding:38px 0 25px}.user-name{display:none}.record-main{padding:19px}.comments{padding:16px 19px}.comment-form{align-items:stretch}.topbar-inner{min-height:64px}}
  </style>
</head>
<body>
  <header class="topbar"><div class="shell topbar-inner"><div class="brand"><span class="brand-mark">🏃</span><span>Runners High</span></div><div class="auth-area"><span id="userName" class="user-name">로그인하지 않음</span><button id="authButton" class="button secondary">Google 로그인</button></div></div></header>
  <main class="shell">
    <section class="hero"><small>RUN TOGETHER</small><h1>오늘의 러닝을 기록해요</h1><p>나의 페이스를 기록하고 러너들과 응원과 댓글을 나눠보세요.</p></section>
    <div class="layout">
      <aside class="panel"><h2>🔥 오늘의 러닝 등록</h2><p class="panel-desc">로그인한 사용자만 러닝 기록을 작성할 수 있습니다.</p><form id="recordForm"><div class="field"><label for="runDate">러닝 날짜</label><input id="runDate" class="input" type="date" required disabled></div><div class="field"><label for="runLocation">장소</label><input id="runLocation" class="input" maxlength="60" placeholder="로그인 후 입력할 수 있습니다" required disabled></div><div class="field-row"><div class="field unit-field"><label for="runDistance">거리</label><input id="runDistance" class="input" type="number" min="0.1" max="1000" step="0.01" placeholder="0.0" required disabled><span class="unit">km</span></div><div class="field unit-field"><label for="runDuration">시간</label><input id="runDuration" class="input" type="number" min="1" max="10000" step="1" placeholder="0" required disabled><span class="unit">분</span></div></div><div class="field"><label for="runMemo">메모</label><input id="runMemo" class="input" maxlength="300" placeholder="로그인 후 입력할 수 있습니다" disabled></div><button id="recordSubmit" class="button full" disabled>러닝 기록 등록</button></form><div id="loginGuide" class="login-guide show">로그인하면 나의 페이스를 남길 수 있어요.</div></aside>
      <section><div class="feed-head"><h2>🏁 크루 실시간 피드</h2><span id="recordCount" class="record-count">0개의 기록</span></div><div id="recordList" class="record-list"><div class="empty">기록을 불러오는 중입니다.</div></div></section>
    </div>
  </main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script type="module">
    import {initializeApp} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import {getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
    import {getFirestore,collection,addDoc,setDoc,deleteDoc,doc,onSnapshot,query,orderBy,serverTimestamp} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig={apiKey:"AIzaSyBH9wy8EMJnc8VK2qKJAQhQcO5HCKOEawI",authDomain:"vibe-coding-88fba.firebaseapp.com",projectId:"vibe-coding-88fba",storageBucket:"vibe-coding-88fba.firebasestorage.app",messagingSenderId:"712429656291",appId:"1:712429656291:web:3ee6e576f554628dd94dd6"};
    const app=initializeApp(firebaseConfig),db=getFirestore(app),auth=getAuth(app),provider=new GoogleAuthProvider();provider.setCustomParameters({prompt:"select_account"});
    const $=id=>document.getElementById(id),ui={userName:$("userName"),authButton:$("authButton"),recordForm:$("recordForm"),runDate:$("runDate"),location:$("runLocation"),distance:$("runDistance"),duration:$("runDuration"),memo:$("runMemo"),submit:$("recordSubmit"),guide:$("loginGuide"),list:$("recordList"),count:$("recordCount"),toast:$("toast")};
    let currentUser=null,toastTimer,latestRecords=null;const cardCleanups=new Map();
    function showToast(message,type="success"){clearTimeout(toastTimer);ui.toast.textContent=message;ui.toast.className=`toast ${type} show`;toastTimer=setTimeout(()=>ui.toast.classList.remove("show"),2600)}
    function formatDate(timestamp){if(!timestamp?.toDate)return "방금 전";return new Intl.DateTimeFormat("ko-KR",{year:"numeric",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}).format(timestamp.toDate())}
    function avatarLetter(name){return (name||"사용자").trim().charAt(0).toUpperCase()}
    function make(tag,className,text){const node=document.createElement(tag);if(className)node.className=className;if(text!==undefined)node.textContent=text;return node}

    function authErrorMessage(error){
      const messages={
        "auth/operation-not-supported-in-this-environment":"HTML 파일을 직접 열면 로그인할 수 없습니다. Firebase Hosting 주소에서 실행해주세요.",
        "auth/unauthorized-domain":`현재 도메인(${location.hostname||"로컬 파일"})이 Firebase 승인 도메인에 없습니다. Authentication 설정에 추가해주세요.`,
        "auth/operation-not-allowed":"Firebase Authentication에서 Google 로그인 제공업체를 활성화해주세요.",
        "auth/popup-blocked":"브라우저가 로그인 팝업을 차단했습니다. 팝업을 허용한 뒤 다시 시도해주세요.",
        "auth/network-request-failed":"네트워크 연결 또는 광고 차단 설정을 확인해주세요.",
        "auth/cancelled-popup-request":"다른 로그인 창이 열려 있습니다.",
        "auth/internal-error":"Firebase Authentication 설정을 확인해주세요."
      };
      return messages[error.code]||`Google 로그인 실패 (${error.code||"알 수 없는 오류"})`;
    }
    ui.authButton.onclick=async()=>{if(location.protocol==="file:")return showToast("HTML 파일을 직접 열면 로그인할 수 없습니다. Firebase Hosting으로 실행해주세요.","error");ui.authButton.disabled=true;try{currentUser?await signOut(auth):await signInWithPopup(auth,provider)}catch(error){console.error("Google login failed:",error.code,error.message);if(error.code!=="auth/popup-closed-by-user")showToast(authErrorMessage(error),"error")}finally{ui.authButton.disabled=false}};
    function today(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
    function paceText(distance,duration){const seconds=Math.round(Number(duration)*60/Number(distance));if(!Number.isFinite(seconds)||seconds<=0)return "-";return `${Math.floor(seconds/60)}' ${String(seconds%60).padStart(2,"0")}\"`}
    ui.runDate.value=today();
    onAuthStateChanged(auth,user=>{currentUser=user;ui.userName.textContent=user?(user.displayName||user.email):"로그인하지 않음";ui.authButton.textContent=user?"로그아웃":"Google 로그인";[ui.runDate,ui.location,ui.distance,ui.duration,ui.memo,ui.submit].forEach(control=>control.disabled=!user);ui.location.placeholder=user?"예: 서울 여의도 공원":"로그인 후 입력할 수 있습니다";ui.memo.placeholder=user?"오늘의 러닝은 어땠나요?":"로그인 후 입력할 수 있습니다";ui.guide.classList.toggle("show",!user);if(!user){ui.recordForm.reset();ui.runDate.value=today()}if(latestRecords)renderRecords(latestRecords)});
    ui.recordForm.onsubmit=async event=>{event.preventDefault();if(!currentUser)return showToast("로그인이 필요합니다.","error");const runDate=ui.runDate.value,location=ui.location.value.trim(),distance=Number(ui.distance.value),duration=Number(ui.duration.value),memo=ui.memo.value.trim();if(!runDate||!location||!Number.isFinite(distance)||distance<=0||!Number.isFinite(duration)||duration<1)return showToast("러닝 기록을 정확히 입력해주세요.","error");ui.submit.disabled=true;try{await addDoc(collection(db,"records"),{runDate,location,distance,duration,memo,authorId:currentUser.uid,authorName:currentUser.displayName||currentUser.email||"러너",createdAt:serverTimestamp()});ui.recordForm.reset();ui.runDate.value=today();showToast("러닝 기록을 등록했습니다.")}catch(error){console.error(error);showToast("기록 등록에 실패했습니다.","error")}finally{ui.submit.disabled=!currentUser}};

    function renderRecords(snapshot){latestRecords=snapshot;cardCleanups.forEach(cleanup=>cleanup());cardCleanups.clear();ui.list.replaceChildren();ui.count.textContent=`${snapshot.size}개의 기록`;if(snapshot.empty){ui.list.append(make("div","empty","아직 등록된 기록이 없습니다. 첫 기록을 남겨보세요."));return}snapshot.docs.forEach(recordSnap=>ui.list.append(createRecordCard(recordSnap)))}
    function createRecordCard(recordSnap){const data=recordSnap.data(),recordId=recordSnap.id,card=make("article","record-card"),main=make("div","record-main"),meta=make("div","record-meta"),author=make("div","author"),avatar=make("div","avatar",avatarLetter(data.authorName)),authorInfo=make("div"),authorName=make("div","author-name",data.authorName||"러너"),date=make("div","date",data.runDate||formatDate(data.createdAt)),tag=make("span","tag",`📍 ${data.location||"장소 미입력"}`),metrics=make("div","metrics"),content=make("p","record-content",data.memo||"오늘도 완주했습니다!"),actions=make("div","record-actions"),spark=make("button","spark-button");
      [["DISTANCE",Number(data.distance||0).toLocaleString(),"km",""],["TIME",Number(data.duration||0).toLocaleString(),"분",""],["AVG PACE",paceText(data.distance,data.duration),"","pace"]].forEach(([label,value,unit,extra])=>{const metric=make("div","metric"),labelNode=make("span","metric-label",label),valueNode=make("strong",`metric-value ${extra}`.trim(),value);if(unit)valueNode.append(make("small","",unit));metric.append(labelNode,valueNode);metrics.append(metric)});authorInfo.append(authorName,date);author.append(avatar,authorInfo);meta.append(author,tag);spark.type="button";spark.innerHTML='<span class="spark-icon" aria-hidden="true">⚡</span><span>응원</span><span class="spark-count">0</span>';actions.append(spark);main.append(meta,metrics,content,actions);
      const comments=make("section","comments"),commentsTitle=make("h4","comments-title","댓글 0개"),commentList=make("div","comment-list"),commentForm=make("form","comment-form"),commentInput=make("input","input comment-input"),commentSubmit=make("button","button comment-submit","등록");commentInput.placeholder="댓글을 입력하세요";commentInput.maxLength=300;commentInput.disabled=!currentUser;commentSubmit.disabled=!currentUser;commentForm.append(commentInput,commentSubmit);comments.append(commentsTitle,commentList,commentForm);card.append(main,comments);
      const sparksRef=collection(db,"records",recordId,"sparks"),commentsRef=collection(db,"records",recordId,"comments");let mine=false;
      const unsubSparks=onSnapshot(sparksRef,snapshot=>{mine=Boolean(currentUser&&snapshot.docs.some(item=>item.id===currentUser.uid));spark.querySelector(".spark-count").textContent=snapshot.size.toLocaleString();spark.classList.toggle("mine",mine);spark.setAttribute("aria-pressed",String(mine));spark.title=currentUser?(mine?"⚡ 취소":"⚡ 보내기"):"로그인이 필요합니다"},error=>console.error(error));
      spark.onclick=async()=>{if(!currentUser)return showToast("⚡은 로그인한 사용자만 누를 수 있습니다.","error");spark.disabled=true;const sparkRef=doc(db,"records",recordId,"sparks",currentUser.uid);try{if(mine)await deleteDoc(sparkRef);else await setDoc(sparkRef,{uid:currentUser.uid,createdAt:serverTimestamp()})}catch(error){console.error(error);showToast("⚡ 반응을 처리하지 못했습니다.","error")}finally{spark.disabled=false}};
      const unsubComments=onSnapshot(query(commentsRef,orderBy("createdAt","asc")),snapshot=>{commentsTitle.textContent=`댓글 ${snapshot.size}개`;commentList.replaceChildren();if(snapshot.empty)commentList.append(make("div","comment-empty","아직 댓글이 없습니다."));snapshot.docs.forEach(commentSnap=>{const comment=commentSnap.data(),row=make("div","comment"),body=make("div","comment-body"),name=make("div","comment-author"),time=make("span","comment-time",formatDate(comment.createdAt)),text=make("div","comment-text",comment.text||"");name.textContent=comment.authorName||"사용자";name.append(time);body.append(name,text);row.append(body);if(currentUser?.uid===comment.authorId){const del=make("button","comment-delete","삭제");del.type="button";del.onclick=async()=>{if(!confirm("댓글을 삭제할까요?"))return;del.disabled=true;try{await deleteDoc(doc(db,"records",recordId,"comments",commentSnap.id))}catch(error){console.error(error);showToast("댓글 삭제에 실패했습니다.","error");del.disabled=false}};row.append(del)}commentList.append(row)})},error=>console.error(error));
      commentForm.onsubmit=async event=>{event.preventDefault();if(!currentUser)return showToast("댓글 작성은 로그인이 필요합니다.","error");const text=commentInput.value.trim();if(!text)return;commentSubmit.disabled=true;try{await addDoc(commentsRef,{text,authorId:currentUser.uid,authorName:currentUser.displayName||currentUser.email||"사용자",createdAt:serverTimestamp()});commentInput.value=""}catch(error){console.error(error);showToast("댓글 등록에 실패했습니다.","error")}finally{commentSubmit.disabled=!currentUser}};
      cardCleanups.set(recordId,()=>{unsubSparks();unsubComments()});return card}
    onSnapshot(query(collection(db,"records"),orderBy("createdAt","desc")),renderRecords,error=>{console.error(error);ui.list.replaceChildren(make("div","empty","기록을 불러오지 못했습니다. Firestore 규칙을 확인해주세요."));showToast("기록을 불러오지 못했습니다.","error")});
  </script>
</body>
</html>
